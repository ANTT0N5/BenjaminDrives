<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>
  <script src="https://unpkg.com/canvas-confetti@1.9.4/dist/confetti.browser.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ===== Mini Zustand-compatible store factory =====
    function create(initializer) {
      let state;
      const listeners = new Set();
      const setState = (partial) => {
        const nextPartial = typeof partial === 'function' ? partial(state) : partial;
        if (nextPartial !== state) {
          state = Object.assign({}, state, nextPartial);
          listeners.forEach((l) => l());
        }
      };
      const getState = () => state;
      const subscribe = (listener) => {
        listeners.add(listener);
        return () => listeners.delete(listener);
      };
      state = initializer(setState, getState);
      function useStore(selector) {
        const sel = selector || ((s) => s);
        const getSlice = () => sel(state);
        const [slice, setSlice] = useState(getSlice);
        const sliceRef = useRef(slice);
        sliceRef.current = slice;
        useEffect(() => {
          const unsub = subscribe(() => {
            const next = sel(getState());
            if (!Object.is(next, sliceRef.current)) {
              sliceRef.current = next;
              setSlice(next);
            }
          });
          return unsub;
        }, []);
        return slice;
      }
      useStore.setState = setState;
      useStore.getState = getState;
      useStore.subscribe = subscribe;
      return useStore;
    }

    
// ===== Geo utilities =====
const EARTH_RADIUS_M = 6371000;
const toRad = (d) => (d * Math.PI) / 180;
const toDeg = (r) => (r * 180) / Math.PI;

function haversineMetres(a, b) {
  const dLat = toRad(b[1] - a[1]);
  const dLng = toRad(b[0] - a[0]);
  const h = Math.sin(dLat/2)**2 + Math.cos(toRad(a[1]))*Math.cos(toRad(b[1]))*Math.sin(dLng/2)**2;
  return 2 * EARTH_RADIUS_M * Math.asin(Math.min(1, Math.sqrt(h)));
}

function isPointInPolygon(p, ring) {
  if (ring.length < 3) return false;
  const r = (ring[0][0] === ring[ring.length-1][0] && ring[0][1] === ring[ring.length-1][1]) ? ring : [...ring, ring[0]];
  return turf.booleanPointInPolygon(turf.point(p), turf.polygon([r]));
}

// Generate a circular polygon (GeoJSON ring) approximating a circle of
// `radiusMetres` centred at `centre`. MapLibre has no native circle layer,
// so we approximate with a 64-sided polygon.
function circleToPolygon(centre, radiusMetres, segments = 64) {
  const [lng, lat] = centre;
  const latRad = (lat * Math.PI) / 180;
  const mPerDegLat = 111320;
  const mPerDegLng = 111320 * Math.cos(latRad);
  const ring = [];
  for (let i = 0; i < segments; i++) {
    const angle = (i / segments) * 2 * Math.PI;
    const dLat = (Math.sin(angle) * radiusMetres) / mPerDegLat;
    const dLng = (Math.cos(angle) * radiusMetres) / mPerDegLng;
    ring.push([lng + dLng, lat + dLat]);
  }
  ring.push(ring[0]); // close the ring
  return ring;
}

const msToKmh = (ms) => ms * 3.6;
const msToMph = (ms) => ms * 2.236936;

// ===== Challenge serializer (Base64 URL-safe) =====
function bytesToBase64Url(bytes) {
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
function base64UrlToBytes(s) {
  const std = s.replace(/-/g, '+').replace(/_/g, '/');
  const padded = std.padEnd(std.length + ((4 - std.length % 4) % 4), '=');
  const binary = atob(padded);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}
function encodeChallenge(challenge, author) {
  const envelope = { v: 1, createdAt: new Date().toISOString(), author, c: challenge };
  return bytesToBase64Url(new TextEncoder().encode(JSON.stringify(envelope)));
}
function decodeChallenge(encoded) {
  const clean = encoded.trim().replace(/\s/g, '');
  if (!clean) throw new Error('Empty challenge payload');
  const json = new TextDecoder().decode(base64UrlToBytes(clean));
  const env = JSON.parse(json);
  if (env.v !== 1) throw new Error('Unsupported schema version');
  if (!env.c) throw new Error('Missing challenge payload');
  return env.c;
}
function buildShareUrl(challenge, author) {
  const origin = typeof window !== 'undefined' ? window.location.origin.split('?')[0] : 'https://benjamindrives.app';
  // For GitHub Pages, ensure path is just / (no index.html)
  const path = window.location.pathname.replace(/index\.html$/, '');
  return `${origin}${path}?challenge=${encodeChallenge(challenge, author)}`;
}
function readChallengeFromUrl(search) {
  const params = new URLSearchParams(search);
  const raw = params.get('challenge');
  if (!raw) return null;
  return decodeChallenge(raw);
}

// ===== Routing (Nominatim + OSRM) =====
async function geocode(query, limit = 6) {
  const trimmed = query.trim();
  if (!trimmed) return [];
  const url = new URL('https://nominatim.openstreetmap.org/search');
  url.searchParams.set('q', trimmed);
  url.searchParams.set('format', 'json');
  url.searchParams.set('limit', String(limit));
  url.searchParams.set('addressdetails', '1');
  const res = await fetch(url.toString(), { headers: { Accept: 'application/json' } });
  if (!res.ok) throw new Error(`Nominatim error: ${res.status}`);
  const data = await res.json();
  return data.map((row) => {
    const parts = row.display_name.split(',');
    return {
      displayName: row.display_name,
      shortName: row.name || parts[0] || row.display_name,
      position: [Number(row.lon), Number(row.lat)],
    };
  });
}

function formatInstruction(type, modifier, name) {
  const road = name || 'the road';
  const onto = `onto ${road}`;
  switch (type) {
    case 'depart': return `Head ${modifier || 'out'} ${onto}`;
    case 'arrive': return 'Arrive at your destination';
    case 'turn': return `Turn ${modifier || 'right'} ${onto}`;
    case 'merge': return `Merge ${modifier || 'right'} ${onto}`;
    case 'on ramp': return `Take the ramp ${onto}`;
    case 'off ramp': return `Take the exit ${onto}`;
    case 'fork': return `Keep ${modifier || 'left'} at the fork ${onto}`;
    case 'end of road': return `Turn ${modifier || 'right'} at the end of the road ${onto}`;
    case 'continue': return `Continue ${modifier || 'straight'} ${onto}`;
    case 'roundabout':
    case 'rotary': return `Enter the roundabout and continue ${onto}`;
    case 'roundabout turn': return `At the roundabout, turn ${modifier || 'right'} ${onto}`;
    case 'exit roundabout':
    case 'exit rotary': return 'Exit the roundabout';
    default: return `Continue ${onto}`;
  }
}

async function fetchRoute(origin, destination) {
  const url = new URL(`https://router.project-osrm.org/route/v1/driving/${origin[0]},${origin[1]};${destination[0]},${destination[1]}`);
  url.searchParams.set('overview', 'full');
  url.searchParams.set('geometries', 'geojson');
  url.searchParams.set('steps', 'true');
  const res = await fetch(url.toString());
  if (!res.ok) throw new Error(`OSRM error: ${res.status}`);
  const data = await res.json();
  if (data.code !== 'Ok' || !data.routes?.length) throw new Error(data.message || 'No route found');
  const route = data.routes[0];
  const steps = [];
  for (const leg of (route.legs || [])) {
    for (const s of (leg.steps || [])) {
      const m = s.maneuver || {};
      const type = m.type || 'notification';
      const name = s.name || '';
      steps.push({
        geometry: s.geometry || { type: 'LineString', coordinates: [] },
        distance: s.distance || 0,
        duration: s.duration || 0,
        name,
        maneuver: { type, modifier: m.modifier, location: m.location || [0, 0] },
        instruction: formatInstruction(type, m.modifier, name),
      });
    }
  }
  return { geometry: route.geometry, distance: route.distance || 0, duration: route.duration || 0, steps };
}

function formatDistance(metres) {
  if (metres < 1000) return `${Math.round(metres / 10) * 10} m`;
  return `${(metres / 1000).toFixed(metres < 10000 ? 1 : 0)} km`;
}
function formatDuration(seconds) {
  if (!Number.isFinite(seconds) || seconds <= 0) return '—';
  const m = Math.round(seconds / 60);
  if (m < 60) return `${m} min`;
  return `${Math.floor(m/60)}h ${m%60}m`;
}
function formatEtaClock(seconds) {
  return new Date(Date.now() + seconds * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ===== Challenge evaluator =====
function evaluateRadar(speedKmh, targets) {
  let stars = 0;
  if (speedKmh >= targets[0]) stars = 1;
  if (speedKmh >= targets[1]) stars = 2;
  if (speedKmh >= targets[2]) stars = 3;
  return stars;
}
function evaluateTrack(completionSeconds, timeTargets) {
  if (completionSeconds <= timeTargets[0]) return 3;
  if (completionSeconds <= timeTargets[1]) return 2;
  if (completionSeconds <= timeTargets[2]) return 1;
  return 0;
}
function evaluateChallenge(challenge, metric) {
  if (challenge.kind === 'radar') {
    return { stars: evaluateRadar(metric, challenge.targets), metricLabel: `${Math.round(metric)} km/h` };
  }
  return { stars: evaluateTrack(metric, challenge.timeTargets), metricLabel: `${metric.toFixed(1)}s` };
}

// ===== Presets (empty — user creates their own challenges) =====
const PRESET_CHALLENGES = [];
const DEFAULT_VIEW = { center: [-3.7038, 40.4168], zoom: 12 };

// ===== LocalStorage persistence (progress + user-created challenges) =====
const STORAGE_KEY = 'horizon-drive:progress:v1';
const CHALLENGES_KEY = 'horizon-drive:challenges:v1';

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { totalStars: 0, totalScore: 0, bestMultiplier: 1, records: {} };
    const p = JSON.parse(raw);
    return { totalStars: p.totalStars || 0, totalScore: p.totalScore || 0, bestMultiplier: p.bestMultiplier || 1, records: p.records || {} };
  } catch { return { totalStars: 0, totalScore: 0, bestMultiplier: 1, records: {} }; }
}
function saveProgress(p) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch {} }

// Load user-created challenges from localStorage so they survive browser restarts.
function loadChallenges() {
  try {
    const raw = localStorage.getItem(CHALLENGES_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return [];
    // Basic shape validation — only keep objects with an id and a known kind.
    return parsed.filter((c) => c && typeof c === 'object' && typeof c.id === 'string' && (c.kind === 'radar' || c.kind === 'track'));
  } catch { return []; }
}
function saveChallenges(challenges) { try { localStorage.setItem(CHALLENGES_KEY, JSON.stringify(challenges)); } catch {} }

    
// ===== Zustand store =====
function computeNewMultiplier(current, lastAt, now) {
  if (lastAt === null) return 1;
  if ((now - lastAt) / 1000 > 60) return 1;
  return Math.min(10, current + 0.5);
}

const useHorizonStore = create((set, get) => ({
  // Map / view
  mapStyle: 'gta',
  followUser: true,
  mapMode: 'drive', // 'drive' | 'create-radar' | 'create-track' | 'set-destination'
  draftTrackPoints: [],
  draftRadarPosition: null,
  draftRadius: 50,
  // Geo
  geo: null,
  geoPermission: 'unknown',
  geoError: null,
  // Challenges — load saved user-created challenges from localStorage on boot
  challenges: loadChallenges(),
  importedChallenge: null,
  activeAttempt: null,
  pendingResult: null,
  // Navigation
  destination: null,
  destinationPin: null,
  route: null,
  routeLoading: false,
  routeError: null,
  isNavigating: false,
  currentStepIndex: 0,
  // Gamification
  multiplier: 1,
  lastCompletionAt: null,
  progress: loadProgress(),

  setMapStyle: (s) => set({ mapStyle: s }),
  setFollowUser: (v) => set({ followUser: v }),
  setMapMode: (m) => set({ mapMode: m, draftRadarPosition: null, draftTrackPoints: [], draftRadius: 50 }),
  setDraftRadarPosition: (p) => set({ draftRadarPosition: p }),
  setDraftRadius: (r) => set({ draftRadius: r }),
  addDraftTrackPoint: (p) => set((s) => ({ draftTrackPoints: [...s.draftTrackPoints, p] })),
  clearDraft: () => set({ draftRadarPosition: null, draftTrackPoints: [], draftRadius: 50 }),

  setGeo: (g) => set({ geo: g }),
  setGeoPermission: (p) => set({ geoPermission: p }),
  setGeoError: (e) => set({ geoError: e }),

  addChallenge: (c) => set((s) => {
    const challenges = [...s.challenges.filter((x) => x.id !== c.id), c];
    // Persist to localStorage so the challenge survives browser restarts.
    saveChallenges(challenges);
    return { challenges };
  }),
  removeChallenge: (id) => set((s) => {
    const challenges = s.challenges.filter((x) => x.id !== id);
    saveChallenges(challenges);
    return { challenges };
  }),
  setImportedChallenge: (c) => set({ importedChallenge: c }),

  startAttempt: (challengeId) => set({ activeAttempt: { challengeId, startedAt: Date.now(), boundaryBreaches: 0, started: false } }),
  cancelAttempt: () => set({ activeAttempt: null }),
  registerBoundaryBreach: () => set((s) => s.activeAttempt ? { activeAttempt: { ...s.activeAttempt, boundaryBreaches: s.activeAttempt.boundaryBreaches + 1 } } : {}),

  finishAttempt: ({ challengeId, challengeName, stars, metric, metricLabel, kind }) => {
    const state = get();
    const now = Date.now();
    const newMult = computeNewMultiplier(state.multiplier, state.lastCompletionAt, now);
    const scoreAwarded = stars * 100 * newMult;
    const prev = state.progress.records[challengeId];
    const isPB = !prev || (kind === 'radar' ? metric > prev.bestMetric : metric < prev.bestMetric);
    const newRecord = { challengeId, bestStars: Math.max(prev?.bestStars || 0, stars), bestMetric: isPB ? metric : prev.bestMetric, attempts: (prev?.attempts || 0) + 1, lastAttemptedAt: new Date().toISOString() };
    const starDelta = stars - (prev?.bestStars || 0);
    const newProgress = {
      totalStars: Math.max(0, state.progress.totalStars + starDelta),
      totalScore: state.progress.totalScore + scoreAwarded,
      bestMultiplier: Math.max(state.progress.bestMultiplier, newMult),
      records: { ...state.progress.records, [challengeId]: newRecord },
    };
    saveProgress(newProgress);
    set({ progress: newProgress, activeAttempt: null, multiplier: newMult, lastCompletionAt: now, pendingResult: { challengeId, challengeName, stars, metricLabel, isPersonalBest: isPB, scoreAwarded } });
  },
  dismissPendingResult: () => set({ pendingResult: null }),

  setDestination: (d) => set({ destination: d, route: null, routeError: null, currentStepIndex: 0, destinationPin: d ? null : get().destinationPin }),
  setDestinationPin: (p) => set({ destinationPin: p, destination: p ? null : get().destination, route: null, routeError: null, currentStepIndex: 0 }),
  setRoute: (r) => set({ route: r, currentStepIndex: 0 }),
  setRouteLoading: (v) => set({ routeLoading: v }),
  setRouteError: (e) => set({ routeError: e }),
  startNavigation: () => set({ isNavigating: true, followUser: true, currentStepIndex: 0 }),
  stopNavigation: () => set({ isNavigating: false }),
  advanceStep: () => set((s) => ({ currentStepIndex: Math.min(s.currentStepIndex + 1, (s.route?.steps.length || 1) - 1) })),
  setCurrentStepIndex: (i) => set({ currentStepIndex: i }),
  clearNavigation: () => set({ destination: null, destinationPin: null, route: null, routeError: null, routeLoading: false, isNavigating: false, currentStepIndex: 0 }),
}));

    
// ===== Hooks =====
function useGeolocation(opts = {}) {
  const { highAccuracy = true, throttleMs = 800 } = opts;
  const setGeo = useHorizonStore((s) => s.setGeo);
  const setGeoPermission = useHorizonStore((s) => s.setGeoPermission);
  const setGeoError = useHorizonStore((s) => s.setGeoError);
  const enabled = React.useRef(false);
  React.useEffect(() => {
    if (enabled.current) return;
    if (!('geolocation' in navigator)) {
      setGeoPermission('unavailable');
      setGeoError('Geolocation is not supported by this browser.');
      return;
    }
    enabled.current = true;
    let watchId = null;
    let lastEmit = 0;
    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        const { latitude, longitude, speed, heading, accuracy } = pos.coords;
        const reading = {
          position: [longitude, latitude],
          speed: (speed == null || Number.isNaN(speed)) ? null : speed,
          heading: (heading == null || Number.isNaN(heading)) ? null : heading,
          timestamp: pos.timestamp,
          accuracy,
        };
        const now = Date.now();
        if (now - lastEmit >= throttleMs) {
          lastEmit = now;
          setGeo(reading);
        }
        setGeoPermission('granted');
        setGeoError(null);
      },
      (err) => {
        if (err.code === err.PERMISSION_DENIED) { setGeoPermission('denied'); setGeoError('Location permission denied. Enable it in your browser to use live navigation.'); }
        else if (err.code === err.POSITION_UNAVAILABLE) { setGeoPermission('unavailable'); setGeoError('Position unavailable. Check your GPS / network.'); }
        else setGeoError(err.message || 'Geolocation timeout.');
      },
      { enableHighAccuracy: highAccuracy, maximumAge: 0, timeout: 10000 },
    );
    return () => { if (watchId !== null) navigator.geolocation.clearWatch(watchId); enabled.current = false; };
  }, [highAccuracy, throttleMs, setGeo, setGeoPermission, setGeoError]);
}

function requestGeolocationOnce() {
  if (!('geolocation' in navigator)) return;
  navigator.geolocation.getCurrentPosition(
    () => useHorizonStore.getState().setGeoPermission('granted'),
    (err) => { if (err.code === err.PERMISSION_DENIED) useHorizonStore.getState().setGeoPermission('denied'); },
    { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 },
  );
}

function useChallengeDetection() {
  const geo = useHorizonStore((s) => s.geo);
  const challenges = useHorizonStore((s) => s.challenges);
  const active = useHorizonStore((s) => s.activeAttempt);
  const startAttempt = useHorizonStore((s) => s.startAttempt);
  const registerBreach = useHorizonStore((s) => s.registerBoundaryBreach);
  const finishAttempt = useHorizonStore((s) => s.finishAttempt);
  const cancelAttempt = useHorizonStore((s) => s.cancelAttempt);

  // Per-radar cooldown timestamps (challengeId → epoch ms when it can fire again)
  const radarCooldowns = React.useRef({});

  // ---- 1. ALWAYS-ACTIVE RADAR PASSIVE DETECTION ----
  // Runs on every GPS tick. If the player is inside a radar's zone (and not
  // on cooldown), the radar fires automatically — no "Attempt" needed.
  React.useEffect(() => {
    if (!geo) return;
    const now = Date.now();
    for (const c of challenges) {
      if (c.kind !== 'radar') continue;
      // Skip if this radar is the current active attempt — active logic handles it
      if (active?.challengeId === c.id) continue;
      const radius = c.radius || 50;
      const dist = haversineMetres(geo.position, c.position);
      if (dist > radius) continue;
      // Check cooldown (10s between firings of the same radar)
      const cooldownUntil = radarCooldowns.current[c.id] || 0;
      if (now < cooldownUntil) continue;
      // Fire! Record speed, set cooldown, push result.
      const speedKmh = geo.speed != null ? msToKmh(geo.speed) : 0;
      const { stars, metricLabel } = evaluateChallenge(c, speedKmh);
      radarCooldowns.current[c.id] = now + 10000;
      finishAttempt({ challengeId: c.id, challengeName: c.name, stars, metric: speedKmh, metricLabel, kind: 'radar' });
    }
  }, [geo, challenges, active, finishAttempt]);

  // ---- 2. ACTIVE ATTEMPT DETECTION (track limits + manual radars) ----
  React.useEffect(() => {
    if (!geo || !active) return;
    const c = challenges.find((x) => x.id === active.challengeId);
    if (!c) return;
    if (c.kind === 'radar') {
      const radius = c.radius || 50;
      const dist = haversineMetres(geo.position, c.position);
      if (dist <= radius) {
        const speedKmh = geo.speed != null ? msToKmh(geo.speed) : 0;
        const { stars, metricLabel } = evaluateChallenge(c, speedKmh);
        radarCooldowns.current[c.id] = Date.now() + 10000;
        finishAttempt({ challengeId: c.id, challengeName: c.name, stars, metric: speedKmh, metricLabel, kind: 'radar' });
      }
      return;
    }
    const distToFinish = haversineMetres(geo.position, c.finish);
    if (active.started) {
      const inside = isPointInPolygon(geo.position, c.boundary);
      if (!inside) {
        if (c.onLeaveBoundary === 'fail') {
          cancelAttempt();
          finishAttempt({ challengeId: c.id, challengeName: c.name, stars: 0, metric: 999999, metricLabel: 'DNF — out of bounds', kind: 'track' });
          return;
        }
        registerBreach();
      }
    } else {
      const distToStart = haversineMetres(geo.position, c.start);
      if (distToStart <= 25) startAttempt(c.id);

function useNavigation() {
  const geo = useHorizonStore((s) => s.geo);
  const destination = useHorizonStore((s) => s.destination);
  const destinationPin = useHorizonStore((s) => s.destinationPin);
  const route = useHorizonStore((s) => s.route);
  const isNavigating = useHorizonStore((s) => s.isNavigating);
  const currentStepIndex = useHorizonStore((s) => s.currentStepIndex);
  const setRoute = useHorizonStore((s) => s.setRoute);
  const setRouteLoading = useHorizonStore((s) => s.setRouteLoading);
  const setRouteError = useHorizonStore((s) => s.setRouteError);
  const advanceStep = useHorizonStore((s) => s.advanceStep);
  const stopNavigation = useHorizonStore((s) => s.stopNavigation);
  const clearNavigation = useHorizonStore((s) => s.clearNavigation);

  const lastFetchKey = React.useRef('');
  React.useEffect(() => {
    if (!geo) return;
    const dest = destination?.position || destinationPin;
    if (!dest) return;
    const key = `${geo.position[0].toFixed(5)},${geo.position[1].toFixed(5)}→${dest[0].toFixed(5)},${dest[1].toFixed(5)}`;
    if (key === lastFetchKey.current) return;
    lastFetchKey.current = key;
    let cancelled = false;
    setRouteLoading(true);
    setRouteError(null);
    fetchRoute(geo.position, dest).then((r) => { if (!cancelled) { setRoute(r); setRouteLoading(false); } }).catch((err) => { if (!cancelled) { setRouteError(err?.message || 'Failed to fetch route'); setRouteLoading(false); } });
    return () => { cancelled = true; };
  }, [geo?.position[0], geo?.position[1], destination, destinationPin, setRoute, setRouteLoading, setRouteError]);

  React.useEffect(() => {
    if (!isNavigating) return;
    const id = setInterval(() => { lastFetchKey.current = ''; }, 30000);
    return () => clearInterval(id);
  }, [isNavigating]);

  React.useEffect(() => {
    if (!isNavigating || !geo || !route) return;
    const step = route.steps[currentStepIndex];
    if (!step) return;
    const dist = haversineMetres(geo.position, step.maneuver.location);
    if (dist <= 35) {
      if (currentStepIndex >= route.steps.length - 1) { stopNavigation(); return; }
      advanceStep();
    }
    const dest = destination?.position || destinationPin;
    if (dest) {
      const dToDest = haversineMetres(geo.position, dest);
      if (dToDest <= 25) stopNavigation();
    }
  }, [geo, route, currentStepIndex, isNavigating, destination, destinationPin, advanceStep, stopNavigation]);

  React.useEffect(() => {
    if (!destination && !destinationPin && route) clearNavigation();
  }, [destination, destinationPin, route, clearNavigation]);
}

        const isActive = activeAttempt?.challengeId === c.id;
        upsertMarker(idS, c.start, () => {
          const el = document.createElement('div');
          el.style.cssText = `display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;border:2px solid ${isActive ? '#6ee7b7' : 'rgba(52,211,153,0.6)'};background:${isActive ? 'rgba(16,185,129,0.8)' : 'rgba(6,78,59,0.8)'};box-shadow:${isActive ? '0 0 16px #10b981' : 'none'};`;
          el.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ecfdf5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><path d="M4 22V15"/></svg>';
          return el;
        });
        upsertMarker(idF, c.finish, () => {
          const el = document.createElement('div');
          el.style.cssText = `display:flex;align-items:center;justify-content:center;width:32px;height:32px;border:2px solid ${isActive ? '#fcd34d' : 'rgba(245,158,11,0.6)'};background:${isActive ? 'rgba(245,158,11,0.8)' : 'rgba(120,53,15,0.8)'};box-shadow:${isActive ? '0 0 16px #f59e0b' : 'none'};clip-path:polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);`;
          el.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fffbeb" stroke-width="2"><rect x="3" y="3" width="18" height="18"/></svg>';
          return el;
        }, 'center');
      }
    });
    // Destination marker
    const dest = destination?.position || destinationPin;
    if (dest) {
      upsertMarker('dest', dest, () => {
        const el = document.createElement('div');
        el.style.cssText = 'position:relative;display:flex;flex-direction:column;align-items:center;';
        el.innerHTML = '<div style="position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:24px;height:24px;border-radius:50%;background:rgba(34,211,238,0.4);animation:ping 2s infinite;"></div><div style="position:relative;display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:2px solid #cffafe;background:rgba(34,211,238,0.9);box-shadow:0 0 18px #22d3ee;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></div><div style="width:2px;height:8px;background:rgba(103,232,249,0.6);"></div>';
        return el;
      });
    } else if (markersRef.current['dest']) {
      markersRef.current['dest'].remove();
      delete markersRef.current['dest'];
    }
    // Draft radar marker
    if (mapMode === 'create-radar' && draftRadarPosition) {
      upsertMarker('draft-radar', draftRadarPosition, () => {
        const el = document.createElement('div');
        el.style.cssText = 'display:flex;flex-direction:column;align-items:center;';
        el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;border:2px solid #cffafe;background:rgba(34,211,238,0.8);box-shadow:0 0 20px #22d3ee;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19.07 4.93A10 10 0 014.93 19.07A10 10 0 0119.07 4.93z"/><path d="M12 12l4-4"/></svg></div><div style="margin-top:4px;font-size:10px;font-weight:600;color:#a5f3fc;">Tap "Create" to save</div>';
        return el;
      });
    } else if (markersRef.current['draft-radar']) {
      markersRef.current['draft-radar'].remove();
      delete markersRef.current['draft-radar'];
    }
    // Draft track points
    draftTrackPoints.forEach((p, i) => {
      const id = `draft-tp-${i}`;
      upsertMarker(id, p, () => {
        const el = document.createElement('div');
        el.style.cssText = 'display:flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;border:1px solid #cffafe;background:rgba(8,145,178,0.8);color:white;font-size:9px;font-weight:bold;';
        el.textContent = i === 0 ? 'S' : (i === draftTrackPoints.length - 1 ? 'F' : String(i));
        return el;
      }, 'center');
    });
    // Clean up stale draft track points
    Object.keys(markersRef.current).forEach((k) => {
      if (k.startsWith('draft-tp-')) {
        const idx = Number(k.replace('draft-tp-', ''));
        if (idx >= draftTrackPoints.length) { markersRef.current[k].remove(); delete markersRef.current[k]; }
      }
    });
    } catch (err) {
      console.error('HorizonMap markers error:', err?.message);
    }
  }, [geo, challenges, activeAttempt, destination, destinationPin, mapMode, draftRadarPosition, draftTrackPoints]);

  // Escape to exit creator mode
  React.useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') { clearDraft(); setMapMode('drive'); } };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [clearDraft, setMapMode]);

  const cursorClass = mapMode === 'drive' ? 'cursor-grab' : 'cursor-crosshair';
  return React.createElement('div', { ref: containerRef, className: `h-full w-full ${cursorClass}` });
}

    
// ===== Main App =====
function App() {
  useGeolocation({ highAccuracy: true, throttleMs: 800 });
  useChallengeDetection();
  useNavigation();

  const setImportedChallenge = useHorizonStore((s) => s.setImportedChallenge);
  const mapMode = useHorizonStore((s) => s.mapMode);
  const isNavigating = useHorizonStore((s) => s.isNavigating);
  const [listOpen, setListOpen] = React.useState(false);
  const [shareTarget, setShareTarget] = React.useState(null);
  const [shareOpen, setShareOpen] = React.useState(false);

  React.useEffect(() => {
    try {
      const c = readChallengeFromUrl(window.location.search);
      if (c) setImportedChallenge(c);
    } catch (err) { console.warn('Failed to decode shared challenge:', err); }
  }, [setImportedChallenge]);

  const handleShare = (c) => { setShareTarget(c); setShareOpen(true); };

  return React.createElement('main', { className: 'relative h-[100dvh] w-screen overflow-hidden bg-slate-950' },
    React.createElement(HorizonMap, null),
    React.createElement(TopBar, { onOpenList: () => setListOpen(true) }),
    // Search bar — on its own row below the top bar on mobile, centered on desktop
    !isNavigating && React.createElement('div', { className: 'pointer-events-none absolute inset-x-0 top-14 z-20 flex justify-center px-3 sm:top-3 sm:px-24 md:px-28' }, React.createElement(SearchBar, null)),
    React.createElement('div', { className: 'pointer-events-none absolute inset-x-0 top-14 z-20 flex justify-center px-3 sm:top-3 sm:px-24 md:px-28' }, React.createElement(NavigationPanel, null)),
    React.createElement('div', { className: 'absolute left-0 top-28 z-10 sm:top-16' }, React.createElement(ChallengeHUD, null)),
    React.createElement('div', { className: 'pointer-events-none absolute bottom-12 left-4 z-10 hidden sm:block' }, React.createElement(Speedometer, { size: 170 })),
    React.createElement('div', { className: 'pointer-events-none absolute bottom-12 left-1/2 z-10 -translate-x-1/2 sm:hidden' }, React.createElement(Speedometer, { size: 130 })),
    (mapMode === 'create-radar' || mapMode === 'create-track') && React.createElement(ChallengeCreator, { onShare: handleShare }),
    React.createElement(ImportedChallengeBanner, null),
    React.createElement(GeoPermissionCard, null),
    React.createElement(ChallengeList, { open: listOpen, onOpenChange: setListOpen, onShare: handleShare }),
    React.createElement(ChallengeResultModal, null),
    React.createElement(ShareDialog, { challenge: shareTarget, open: shareOpen, onClose: () => setShareOpen(false) }),
    React.createElement(SafetyDisclaimer, null),
  );
}

// ===== Mount =====
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));

  </script>
</body>
